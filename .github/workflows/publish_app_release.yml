name: build-ios
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # 用稳定的 Flutter 3.24.0（Dart 3.5.4，兼容你所有依赖）
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      # 强制修改 pubspec.yaml，一次性解决所有依赖冲突
      - name: Force fix all dependencies
        run: |
          cd simple_live_app
          # 备份原始文件
          cp pubspec.yaml pubspec.yaml.bak
          # 修改 intl 版本
          sed -i '' 's/intl: ^0.20.2/intl: ^0.19.0/g' pubspec.yaml
          # 修改 url_launcher 版本
          sed -i '' 's/url_launcher: >=6.3.2/url_launcher: 6.2.5/g' pubspec.yaml
          # 修改 image_gallery_saver_plus 版本（关键！）
          sed -i '' 's/image_gallery_saver_plus: >=4.0.0-0.alpha/image_gallery_saver_plus: 3.1.0/g' pubspec.yaml
          # 强制清理缓存并安装依赖
          flutter clean
          flutter pub cache repair
          flutter pub get

      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Make IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ios_no_sign.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
