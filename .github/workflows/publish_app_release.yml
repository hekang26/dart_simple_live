name: build-ios-only
on:
  workflow_dispatch:

jobs:
  build-mac-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      # 固定和 intl 0.19.0 兼容的 Flutter 版本
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      # 强制覆盖 intl 版本，彻底绕过冲突（关键！）
      - name: Fix intl dependency conflict
        run: |
          cd simple_live_app
          # 强制修改 pubspec.yaml 里的 intl 版本为 0.19.0
          sed -i.bak 's/intl: ^0.20.2/intl: ^0.19.0/g' pubspec.yaml
          rm -f pubspec.yaml.bak
          # 强制清理缓存并获取依赖
          flutter clean
          flutter pub cache repair
          flutter pub get

      # 直接打包 iOS（兼容你的 16.4.1）
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 生成可安装的 IPA
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_no_sign.ipa Payload
          cd ../../..

      # 上传到 Artifacts，你直接下载就能用
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
