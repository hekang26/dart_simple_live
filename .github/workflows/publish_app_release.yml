name: app-build-action
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-ios-android:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v5
        with:
          ref: master

      # 2. 设置 Flutter 环境（兼容 iOS 16）
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          cache: true

      # 3. 强制设置 iOS 最低版本为 16.0（关键！）
      - name: Set iOS Deployment Target
        run: |
          cd simple_live_app
          # 修改 Podfile 强制最低版本为 16.0
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/' ios/Podfile
          sed -i '' 's/platform :ios, .*/platform :ios, "16.0"/' ios/Podfile
          flutter pub get
          cd ios
          pod install --repo-update

      # 4. 打包 iOS（无签名，兼容 iOS 16）
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 5. 创建可安装的 IPA
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_no_sign.ipa Payload
          cd ../../..

      # 6. 上传 IPA 到 Artifacts（即使 Release 失败也能拿到包）
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 7. 上传到 GitHub Release（正确的 Action）
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
