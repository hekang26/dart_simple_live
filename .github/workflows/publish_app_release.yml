name: app-build-action
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-ios-android:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      # 1. 签出代码
      - uses: actions/checkout@v5
        with:
          ref: master

      # 2. 换用兼容你项目依赖的 Flutter 3.27.x（支持 intl 0.20.x）
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          cache: true

      # 3. 强制解决依赖冲突（关键！）
      - name: Resolve Dependencies
        run: |
          cd simple_live_app
          flutter pub upgrade --major-versions
          flutter pub add intl:0.20.2 --ignore-pubspec
          flutter pub get

      # 4. 打包 iOS（兼容 iOS 16.4.1）
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign --no-analytics

      # 5. 创建可安装的 IPA
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_no_sign.ipa Payload
          cd ../../..

      # 6. 上传 IPA 到 Artifacts（100% 能拿到包）
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 7. 上传到 GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
