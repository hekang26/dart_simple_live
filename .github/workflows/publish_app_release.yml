name: build-ios
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      # 用和你所有依赖都兼容的稳定版
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          channel: stable

      # 强制修改 pubspec.yaml，让所有依赖版本都兼容
      - name: Force dependency versions
        run: |
          cd simple_live_app
          # 把 intl 降到兼容版本
          sed -i.bak 's/intl: ^0.20.2/intl: ^0.19.0/g' pubspec.yaml
          # 把 url_launcher 降到兼容 Dart 3.5 的版本
          sed -i.bak 's/url_launcher: >=6.3.2/url_launcher: 6.2.5/g' pubspec.yaml
          rm -f pubspec.yaml.bak pubspec.yaml.bak.bak
          # 强制清理并安装依赖
          flutter clean
          flutter pub cache repair
          flutter pub get

      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      - name: Make IPA
        run: |
          cd simple_live_app/build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ios_no_sign.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
