name: app-build-action
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-ios-android:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      # 设置 Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          cache: true

      # 强制 Flutter 支持 iOS 16.0
      - name: Set iOS Deployment Target to 16.0
        run: |
          cd simple_live_app
          flutter pub get
          cd ios
          pod install
          xcodebuild -list
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 16.0" Runner/Info.plist
          echo "IPHONEOS_DEPLOYMENT_TARGET = 16.0;" >> Runner.xcodeproj/project.pbxproj

      # 打包 iOS（支持 iOS 16.4.1）
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign --dart-define=target=ios16

      # 创建可安装的 IPA
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_no_sign.ipa Payload
          cd ../../..

      # 上传 IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 上传 Release
      - name: Upload to Release
        uses: softprops/gh-release-uploader@v1
        with:
          tag: ${{ github.ref_name }}
          token: ${{ secrets.TOKEN }}
          files: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
