name: app-build-action
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-mac-ios:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      # 固定兼容的 Flutter 版本
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          cache: true

      # 正常获取依赖（不会再冲突）
      - name: Get dependencies
        run: |
          cd simple_live_app
          flutter pub get

      # 直接打包 iOS（兼容你的 16.4.1）
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      # 生成可安装的 IPA
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ios_no_sign.ipa Payload
          cd ../../..

      # 上传到 Artifacts，你直接下载就能用
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
